name: Update Macro Data

on:
  schedule:
    - cron: '0 11 * * 1-5'  # dias úteis, 11h UTC (8h BRT)
  workflow_dispatch:         # permite rodar manualmente

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Buscar dados das APIs
        run: python scripts/fetch_macro.py

      - name: Commit e push (se houver mudança)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/macro-data.json
          git diff --cached --quiet && echo "Sem mudanças." || (
            git commit -m "data: atualiza indicadores macro $(date -u +%Y-%m-%d)"
            git push
          )

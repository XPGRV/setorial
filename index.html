<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard - Setorial</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preload" as="image" href="/xp-asset-logo.svg" type="image/svg+xml" fetchpriority="high" />
  <link rel="preload" as="image" href="/meat-food.gif" type="image/gif" fetchpriority="high" />
  <link rel="preload" as="image" href="/factory.gif" type="image/gif" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="src/styles.css" />
  <link rel="stylesheet" href="src/themes.css" />
  <link rel="stylesheet" href="src/reactive.css" />

  <script>
    /* Resolve tema/modo/accent ANTES de qualquer paint (inclui a tela de loading),
       seguindo o prefers-color-scheme do sistema ou a preferência salva. */
    (function () {
      var root = document.documentElement;
      root.dataset.theme = 'flux';
      root.dataset.density = 'comfortable';
      var resolved = 'dark';
      try {
        var m = localStorage.getItem('rx-color-mode');
        var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        resolved = (m === 'light' || m === 'dark') ? m : (sysDark ? 'dark' : 'light');
      } catch (e) {}
      root.dataset.mode = resolved;
      root.style.setProperty('--accent',
        resolved === 'light' ? 'oklch(0.55 0.18 155)' : 'oklch(0.82 0.18 155)');
    })();
  </script>

  <style>
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg, oklch(0.17 0.008 255));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      transition: opacity 0.22s ease, visibility 0.22s ease;
    }
    #loading-screen.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .ld-logobox {
      width: 200px;
      border-radius: 12px;
      padding: 14px 20px;
      background: linear-gradient(140deg,
        oklch(0.72 0.18 240),
        oklch(0.48 0.16 240));
      box-shadow:
        0 1px 0 oklch(1 0 0 / 0.12) inset,
        0 0 36px oklch(0.72 0.18 240 / 0.25);
    }
    .ld-logobox img {
      width: 100%;
      height: auto;
      display: block;
      filter: brightness(0) invert(1);
    }
    .ld-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .ld-title {
      font-family: "Inter Tight", system-ui, sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--fg, oklch(0.96 0.004 255));
    }
    .ld-sub {
      font-family: ui-monospace, monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--fg-mute, oklch(0.52 0.008 255));
    }
    .ld-bar {
      width: 180px;
      height: 2px;
      border-radius: 2px;
      background: var(--border, oklch(0.26 0.010 255));
      overflow: hidden;
      position: relative;
    }
    .ld-bar::after {
      content: '';
      position: absolute;
      top: 0; left: -60%;
      width: 60%;
      height: 100%;
      border-radius: 2px;
      background: oklch(0.72 0.18 240);
      box-shadow: 0 0 10px oklch(0.72 0.18 240 / 0.55);
      animation: ld-slide 1.1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes ld-slide {
      0%   { left: -60%; }
      100% { left: 110%; }
    }
  </style>
</head>

<body>
  <div id="loading-screen">
    <div class="ld-logobox">
      <img src="/xp-asset-logo.svg" alt="XP Asset Management" fetchpriority="high" decoding="sync" />
    </div>
    <div class="ld-text">
      <div class="ld-title">Setorial</div>
      <div class="ld-sub">Carregando dados…</div>
    </div>
    <div class="ld-bar"></div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
